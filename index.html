<!DOCTYPE html>

<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>What's in P'min bag</title>

    <style>

        body, html {

            margin: 0;

            padding: 0;

            width: 100%;

            height: 100%;

            overflow: hidden; /* ป้องกันการเลื่อนแบบปกติ */

            background-color: #fff;

            font-family: sans-serif;

        }



        .gallery-container {

            position: relative;

            width: 100%;

            height: 100%;

        }



        .slide {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            display: flex;

            justify-content: center;

            align-items: center;

            opacity: 0; /* ซ่อนรูปที่ยังไม่ถึงคิว */

            transition: opacity 0.6s ease-in-out, transform 0.6s ease-in-out;

            pointer-events: none;

            z-index: 1;

        }



        .slide.active {

            opacity: 1; /* แสดงรูปปัจจุบัน */

            pointer-events: auto;

            z-index: 2;

            transform: scale(1);

        }



        /* เอฟเฟกต์ตอนภาพเก่าออกไป (ให้หายไปเฉยๆ หรือยุบตัว) */

        .slide.exit {

            opacity: 0;

            transform: scale(1.05);

        }



        .slide img {

            max-width: 98%;

            max-height: 98%;

            object-fit: contain;

        }



        /* ตัวบอกใบ้ (Optional) */

        .hint {

            position: absolute;

            bottom: 20px;

            width: 100%;

            text-align: center;

            color: #ccc;

            font-size: 12px;

            z-index: 10;

        }

    </style>

</head>

<body>



    <div class="gallery-container" id="main-container">

        <div class="slide active" id="s1"><img src="image1.png" alt="1"></div>

        <div class="slide" id="s2"><img src="image2.png" alt="2"></div>

        <div class="slide" id="s3"><img src="image3.png" alt="3"></div>

        <div class="slide" id="s4"><img src="image4.png" alt="4"></div>

        <div class="slide" id="s5"><img src="image5.png" alt="5"></div>

       

        <div class="hint">ลองปัดตามสเต็ป: ขึ้น > ซ้าย > ซ้าย > ขึ้น</div>

    </div>



    <script>

        let currentStep = 0;

        const slides = document.querySelectorAll('.slide');

       

        // กำหนดทิศทางที่ต้องการ: [ทิศทาง, ลำดับภาพถัดไป]

        const sequence = [

            { dir: 'up', next: 1 },    // จากรูป 1 ปัดขึ้นไปรูป 2

            { dir: 'left', next: 2 },  // จากรูป 2 ปัดซ้ายไปรูป 3

            { dir: 'left', next: 3 },  // จากรูป 3 ปัดซ้ายไปรูป 4

            { dir: 'up', next: 4 }     // จากรูป 4 ปัดขึ้นไปรูป 5

        ];



        let touchStartX = 0;

        let touchStartY = 0;



        const container = document.getElementById('main-container');



        container.addEventListener('touchstart', e => {

            touchStartX = e.changedTouches[0].screenX;

            touchStartY = e.changedTouches[0].screenY;

        }, false);



        container.addEventListener('touchend', e => {

            let touchEndX = e.changedTouches[0].screenX;

            let touchEndY = e.changedTouches[0].screenY;

            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);

        }, false);



        // รองรับการลากเมาส์สำหรับคอมพิวเตอร์

        container.addEventListener('mousedown', e => {

            touchStartX = e.screenX;

            touchStartY = e.screenY;

        }, false);



        container.addEventListener('mouseup', e => {

            handleSwipe(touchStartX, touchStartY, e.screenX, e.screenY);

        }, false);



        function handleSwipe(startX, startY, endX, endY) {

            const diffX = startX - endX;

            const diffY = startY - endY;

            let direction = '';



            // ตรวจสอบว่าปัดไปทางไหน (เอาทางที่ลากยาวกว่า)

            if (Math.abs(diffX) > Math.abs(diffY)) {

                if (diffX > 50) direction = 'left';

                else if (diffX < -50) direction = 'right';

            } else {

                if (diffY > 50) direction = 'up';

                else if (diffY < -50) direction = 'down';

            }



            if (currentStep < sequence.length) {

                const target = sequence[currentStep];

                if (direction === target.dir) {

                    changeSlide(target.next);

                    currentStep++;

                }

            }

        }



        function changeSlide(nextIndex) {

            const currentSlide = document.querySelector('.slide.active');

            const nextSlide = slides[nextIndex];



            // ทำการ Fade ภาพเก่าออก

            currentSlide.classList.remove('active');

            currentSlide.classList.add('exit');



            // แสดงภาพใหม่

            nextSlide.classList.add('active');



            // ล้างสถานะภาพเก่าหลังจาก Transition จบ

            setTimeout(() => {

                currentSlide.classList.remove('exit');

            }, 600);

        }

    </script>

</body>

</html>
